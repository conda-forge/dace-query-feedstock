{% set name = "dace-query" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/dace_query-{{ version }}.tar.gz
  sha256: c7c0a2c6fd000efbaf694ffdfa2dab1184010ebc0f3f4c81c3bc7e7a66a2968f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
    - sphinx >=5.3.0
    - pytest >=7.2.0
  run:
    - python >={{ python_min }}
    - requests >=2.28.1
    - numpy >=1.23.4
    - pandas >=2.0.0
    - astropy-base >=5.1.1
    - astroquery >=0.4.5

test:
  imports:
    - dace_query
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://dace.unige.ch/
  dev_url: https://github.com/astro-dace/dace-query
  summary: dace-query allows for easy querying of DACE and provides access to both public and private data through a simple utility.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jbdelisle
